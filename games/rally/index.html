<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rally — BCI Arcade</title>
    <style>
      :root {
        --bg-page: #0d1117;
        --bg-card: #1a222d;
        --bg-card-hover: #222c3a;
        --border: #2d333b;
        --border-strong: #3a4150;

        --text-primary: #e8e4d9;
        --text-muted: #9aa4b1;
        --text-dim: #5d6670;

        --click-blue: #4488ff;
        --click-orange: #ff8833;
        --click-purple: #aa44ff;

        --good: #5fbf6e;
        --bad: #d44b4b;

        /* Tennis scene palette — US Open style hard court. */
        --court-frame: #08120f;
        --sky-top: #4a6a8b;
        --sky-bottom: #94b1c5;
        --crowd: #1d2228;
        --stand-wall: #21342b;
        --stand-wall-line: #d8c468;
        --surround: #2f6b3a;
        --surround-dark: #245029;
        --court-blue: #2a5fa0;
        --court-blue-dark: #224d83;
        --court-line: #f1ede0;
        --net-tape: #f1ede0;
        --net-mesh: rgba(15, 18, 22, 0.45);
        --net-post: #444b54;
        --player-shirt: #1a2a4a;
        --player-shirt-dark: #11203a;
        --player-skin: #c89b75;
        --player-hair: #261b14;
        --ai-shirt: #efe9d9;
        --ai-shirt-dark: #cac4b4;
        --ai-shorts: #1a2a4a;
        --racket-frame: #1a1a1a;
        --racket-string: rgba(241, 237, 224, 0.65);
        --racket-grip: #2c2118;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: var(--bg-page);
        min-height: 100vh;
        font-family: 'Courier New', monospace;
        color: var(--text-primary);
        user-select: none;
        overflow: hidden;
      }

      #fit-wrap {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #game-wrapper {
        width: 900px;
        height: 700px;
        position: relative;
        transform-origin: center center;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      /* ── Header ──────────────────────────────────────────────── */
      .game-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 18px;
        padding: 12px 16px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 8px;
        height: 64px;
        flex-shrink: 0;
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .back-btn {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text-muted);
        font-family: inherit;
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        padding: 8px 13px;
        cursor: pointer;
        transition:
          color 0.15s,
          border-color 0.15s,
          background 0.15s;
      }
      .back-btn:hover {
        color: var(--text-primary);
        border-color: var(--click-blue);
        background: var(--bg-card-hover);
      }

      .title-block .game-title {
        font-size: 18px;
        font-weight: bold;
        letter-spacing: 4px;
        text-transform: uppercase;
      }
      .title-block .game-subtitle {
        font-size: 9px;
        color: var(--text-muted);
        letter-spacing: 3px;
        text-transform: uppercase;
        margin-top: 3px;
      }

      .hud {
        display: flex;
        align-items: center;
        gap: 22px;
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text-muted);
      }
      .hud-stat {
        display: flex;
        flex-direction: column;
        gap: 2px;
        align-items: center;
        min-width: 56px;
      }
      .hud-label {
        font-size: 9px;
        color: var(--text-dim);
      }
      .hud-value {
        font-size: 16px;
        font-weight: bold;
        color: var(--text-primary);
        font-family: inherit;
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .icon-btn {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text-muted);
        font-family: inherit;
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        padding: 8px 13px;
        cursor: pointer;
        transition:
          color 0.15s,
          border-color 0.15s,
          background 0.15s;
      }
      .icon-btn:hover {
        color: var(--text-primary);
        border-color: var(--border-strong);
        background: var(--bg-card-hover);
      }
      .icon-btn[disabled] {
        opacity: 0.4;
        cursor: not-allowed;
      }

      /* ── Canvas + court frame ────────────────────────────────── */
      .court-frame {
        position: relative;
        flex: 1;
        background: var(--court-frame);
        border: 1px solid var(--border-strong);
        border-radius: 8px;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      canvas {
        display: block;
        cursor: none;
      }

      /* ── Bottom bar ──────────────────────────────────────────── */
      .bottom-bar {
        height: 88px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 8px;
        gap: 18px;
      }
      .bb-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .status-msg {
        font-size: 12px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text-muted);
      }
      .status-msg .accent {
        color: var(--text-primary);
      }
      .home-slot {
        display: flex;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <div id="fit-wrap">
      <div id="game-wrapper">
        <header class="game-header">
          <div class="header-left">
            <button class="back-btn" id="btn-back">&larr; Back</button>
            <div class="title-block">
              <div class="game-title">Rally</div>
              <div class="game-subtitle">v1 — Tennis · Checkpoint 4</div>
            </div>
          </div>
          <div class="hud">
            <div class="hud-stat">
              <div class="hud-label">Rally</div>
              <div class="hud-value" id="hud-rally">0</div>
            </div>
            <div class="hud-stat">
              <div class="hud-label">Best</div>
              <div class="hud-value" id="hud-best">0</div>
            </div>
            <div class="hud-stat">
              <div class="hud-label">Score</div>
              <div class="hud-value" id="hud-score">0–0</div>
            </div>
          </div>
          <div class="header-right">
            <button class="icon-btn" id="btn-stats" disabled>Stats</button>
            <button class="icon-btn" id="btn-settings" disabled>Settings</button>
          </div>
        </header>

        <div class="court-frame">
          <canvas id="canvas" width="800" height="540"></canvas>
        </div>

        <div class="bottom-bar">
          <div class="bb-content">
            <div class="status-msg" id="status-msg">
              <span class="accent">Match the color to return.</span> Wrong color or no swing and the
              ball goes into the net. AI return loop lands in checkpoint 5.
            </div>
          </div>
          <div class="home-slot" id="home-slot"></div>
        </div>
      </div>
    </div>

    <script src="../../shared/bci-input.js"></script>
    <script src="../../shared/bci-settings.js"></script>
    <script src="../../shared/bci-analytics.js"></script>
    <script src="../../shared/bci-shell.js"></script>
    <script>
      'use strict';

      const GAME_ID = 'rally';

      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const W = canvas.width;
      const H = canvas.height;

      /* Suppress the right-click context menu so the orange (right) click
         is usable inside the canvas. */
      canvas.addEventListener('contextmenu', (e) => e.preventDefault());

      /* Header buttons */
      document.getElementById('btn-back').addEventListener('click', () => BCI.goToLauncher());
      document.getElementById('home-slot').appendChild(BCI.createHomeButton({ showLabel: true }));

      /* Viewport fitter */
      const wrapper = document.getElementById('game-wrapper');
      const fitter = BCI.createViewportFitter(wrapper);
      fitter.fit();
      requestAnimationFrame(() => fitter.fit());

      /* ── Virtual cursor ───────────────────────────────────────
         Starts at the player's neutral stance (center of the near
         baseline, slightly above where the racket sits). */
      const cursor = BCI.createVirtualCursor(canvas, {
        sensitivity: 1.0,
        startX: W / 2,
        startY: 418,
      });

      /* ── Racket state ─────────────────────────────────────────
         Racket X tracks the cursor with light easing so motion feels
         settled rather than jittery. Y is fixed in the foreground hit
         zone — vertical control is intentionally not part of v1 (the
         halo timing window in checkpoint 3 governs the depth read). */
      let racketX = W / 2;
      const RACKET_LERP = 0.3;

      /* ── Color identity (matches BCI.CLICKS) ──────────────────── */
      const COLOR_HEX = {
        blue: '#4488ff',
        orange: '#ff8833',
        purple: '#aa44ff',
      };
      const BALL_COLORS = ['blue', 'orange', 'purple'];

      /* ── Rally state machine ──────────────────────────────────
         IDLE → INCOMING → POST → IDLE …

         Per the BCI timing-window rule, the GOOD click window spans
         the entire ball flight (~75% of action duration). The halo
         is the always-visible cue that contracts as the swing
         moment approaches — not a hard gate. PERFECT is reserved as
         a future quality upgrade (e.g. ACE returns) once the base
         loop is tuned. */
      const PHASE = {
        IDLE: 'idle',
        INCOMING: 'incoming',
        RETURNING: 'returning',
        NETTED: 'netted',
        POST: 'post',
      };
      let phase = PHASE.IDLE;
      let phaseStart = 0;
      let activeBall = null;
      let lastOutcome = null; // 'return' | 'net-wrong' | 'net-timeout' | null
      let racketSwingT = 0; // 1 → 0 fade after a swing fires

      const BALL_FLIGHT_MS = 2200;
      const RETURN_FLIGHT_MS = 1500;
      const NET_FLIGHT_MS = 600;
      const IDLE_MS = 1200;
      const POST_MS = 700;

      function startNextBall(now) {
        const color = BALL_COLORS[Math.floor(Math.random() * 3)];
        // AI's racket release point — slightly off-center per shot
        const startX = COURT.aiX + (Math.random() - 0.5) * 28;
        const startY = COURT.aiBaseY - 14;
        // Land somewhere inside the player's hit zone, biased to a side
        // so the cursor has a real read each time.
        const sideJitter = (Math.random() - 0.5) * 320;
        const endX = COURT.centerX + sideJitter;
        const endY = COURT.racketY;

        activeBall = {
          color,
          startX,
          startY,
          endX,
          endY,
          apex: 95, // peak rise above the linear path, in screen-px
          startSize: 4.5,
          endSize: 11.5,
          startHaloR: 58,
          endHaloR: 18,
        };
        phase = PHASE.INCOMING;
        phaseStart = now;
      }

      function flightDurationFor(p) {
        if (p === PHASE.INCOMING) return BALL_FLIGHT_MS;
        if (p === PHASE.RETURNING) return RETURN_FLIGHT_MS;
        if (p === PHASE.NETTED) return NET_FLIGHT_MS;
        return 0;
      }

      function getBallState(now) {
        if (
          !activeBall ||
          (phase !== PHASE.INCOMING && phase !== PHASE.RETURNING && phase !== PHASE.NETTED)
        ) {
          return null;
        }
        const b = activeBall;
        const dur = flightDurationFor(phase);
        const t = Math.min(1, (now - phaseStart) / dur);
        const x = b.startX + (b.endX - b.startX) * t;
        const linY = b.startY + (b.endY - b.startY) * t;
        const arc = -4 * b.apex * t * (1 - t);
        const y = linY + arc;
        const r = b.startSize + (b.endSize - b.startSize) * t;
        const haloR = b.startHaloR + (b.endHaloR - b.startHaloR) * t;
        return { x, y, linY, r, haloR, t, color: b.color };
      }

      function startReturn(now) {
        const cur = getBallState(now);
        if (!cur) return;
        activeBall = {
          color: activeBall.color,
          startX: cur.x,
          startY: cur.y,
          endX: COURT.aiX + (Math.random() - 0.5) * 60,
          endY: COURT.aiBaseY - 18,
          apex: 90,
          startSize: cur.r,
          endSize: 4.5,
          startHaloR: 0,
          endHaloR: 0,
        };
        phase = PHASE.RETURNING;
        phaseStart = now;
        lastOutcome = 'return';
        racketSwingT = 1;
        setStatus('clean');
      }

      function startNetted(now, reason) {
        const cur = getBallState(now);
        const sx = cur ? cur.x : activeBall.endX;
        const sy = cur ? cur.y : activeBall.endY;
        // Drop the ball forward and down into the net base. Slight forward
        // drift toward AI side so it visually "tries to clear the net."
        const forwardDX = (COURT.centerX - sx) * 0.4;
        activeBall = {
          color: activeBall.color,
          startX: sx,
          startY: sy,
          endX: sx + forwardDX,
          endY: COURT.netY + COURT.netMeshH + 4,
          apex: 18,
          startSize: cur ? cur.r : 11.5,
          endSize: 9,
          startHaloR: 0,
          endHaloR: 0,
        };
        phase = PHASE.NETTED;
        phaseStart = now;
        lastOutcome = reason === 'wrong' ? 'net-wrong' : 'net-timeout';
        if (reason === 'wrong') racketSwingT = 1;
        setStatus(lastOutcome);
      }

      function tickRallyState(now) {
        if (phase === PHASE.IDLE) {
          if (now - phaseStart >= IDLE_MS) startNextBall(now);
        } else if (phase === PHASE.INCOMING) {
          if (now - phaseStart >= BALL_FLIGHT_MS) startNetted(now, 'timeout');
        } else if (phase === PHASE.RETURNING) {
          if (now - phaseStart >= RETURN_FLIGHT_MS) {
            phase = PHASE.POST;
            phaseStart = now;
          }
        } else if (phase === PHASE.NETTED) {
          if (now - phaseStart >= NET_FLIGHT_MS) {
            phase = PHASE.POST;
            phaseStart = now;
          }
        } else if (phase === PHASE.POST) {
          if (now - phaseStart >= POST_MS) {
            phase = PHASE.IDLE;
            phaseStart = now;
            activeBall = null;
          }
        }
      }

      /* ── Click handling ──────────────────────────────────────── */
      function handleClick(button) {
        if (phase !== PHASE.INCOMING) return;
        const click = BCI.CLICK_BY_BUTTON[button];
        if (!click) return;
        const colorName = click.name.toLowerCase(); // 'blue' / 'orange' / 'purple'
        const now = performance.now();
        if (colorName === activeBall.color) {
          startReturn(now);
        } else {
          startNetted(now, 'wrong');
        }
      }

      canvas.addEventListener('mousedown', (e) => handleClick(e.button));

      /* ── Status message helper ───────────────────────────────── */
      const STATUS_EL = document.getElementById('status-msg');
      const STATUS_TEXT = {
        clean:
          '<span class="accent" style="color: var(--good)">Clean return.</span> Keep the rally going — AI loop lands in checkpoint 5.',
        'net-wrong':
          '<span class="accent" style="color: var(--bad)">Wrong color — into the net.</span> Match blue / orange / purple to the ball.',
        'net-timeout':
          '<span class="accent" style="color: var(--bad)">Whiffed — into the net.</span> Click a color before the halo closes.',
        idle: '<span class="accent">Match the color to return.</span> Wrong color or no swing and the ball goes into the net.',
      };
      function setStatus(key) {
        STATUS_EL.innerHTML = STATUS_TEXT[key] || STATUS_TEXT.idle;
      }

      /* ── Court geometry — behind-player POV ────────────────────
         Vanishing point sits high on the back wall. The court is a
         trapezoid: wide at the player's near baseline (cropped at
         the bottom by the player silhouette) and narrow at the AI's
         far baseline. The net cuts across roughly the middle. */
      const COURT = {
        // Sky / crowd / back wall band
        skyTopY: 0,
        skyBottomY: 105,
        crowdY: 96,
        wallY: 120,
        wallH: 22,

        // Court trapezoid (in screen-space)
        nearBaselineY: 472,
        nearHalfW: 330, // → x ∈ [70, 730]
        farBaselineY: 175,
        farHalfW: 95, // → x ∈ [305, 495]
        centerX: 400,

        // Net (sits at the far end of the front service box, between
        // the two service lines on the AI side and player side)
        netY: 295,
        netTapeH: 6,
        netMeshH: 22,
        netPostExtra: 14, // posts extend slightly past sidelines

        // Service lines (mirrored either side of the net)
        farServiceY: 235,
        nearServiceY: 383, // halfway between net and near baseline

        // Racket hit zone — fixed Y where the floating racket sits
        racketY: 418,

        // AI player position at the far baseline
        aiX: 400,
        aiBaseY: 175,
        aiHeight: 62,

        // Player silhouette in foreground (back of head + shoulders +
        // racket arm). Anchored so the head sits just below the net.
        playerCenterX: 400,
        playerHeadY: 470,
      };

      /* ── Drawing helpers ─────────────────────────────────────── */
      function getCSSVar(name) {
        return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
      }

      // Linear interpolation along court depth (0 = near, 1 = far)
      function depthLerp(t, near, far) {
        return near + (far - near) * t;
      }

      // Returns court half-width at a given screen Y (between near and far baseline).
      function courtHalfWidthAtY(y) {
        const t = (COURT.nearBaselineY - y) / (COURT.nearBaselineY - COURT.farBaselineY);
        const tt = Math.max(0, Math.min(1, t));
        return depthLerp(tt, COURT.nearHalfW, COURT.farHalfW);
      }

      /* ── Scene draws ─────────────────────────────────────────── */
      function drawSky() {
        const grad = ctx.createLinearGradient(0, 0, 0, COURT.skyBottomY);
        grad.addColorStop(0, getCSSVar('--sky-top'));
        grad.addColorStop(1, getCSSVar('--sky-bottom'));
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, COURT.skyBottomY);
      }

      function drawCrowd() {
        ctx.fillStyle = getCSSVar('--crowd');
        ctx.fillRect(0, COURT.crowdY - 8, W, 22);

        ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
        const heads = 110;
        for (let i = 0; i < heads; i++) {
          const t = (i + 0.5) / heads;
          const jitter = Math.sin(i * 12.9898) * 0.5;
          const x = t * W + jitter * 6;
          const y = COURT.crowdY + Math.sin(i * 7.13) * 1.6;
          ctx.beginPath();
          ctx.arc(x, y, 2.3, 0, Math.PI * 2);
          ctx.fill();
        }

        // Scoreboard glint on the back wall
        const sbX = W / 2 - 70;
        const sbY = COURT.crowdY - 28;
        ctx.fillStyle = 'rgba(30, 35, 42, 0.85)';
        ctx.fillRect(sbX, sbY, 140, 20);
        ctx.fillStyle = 'rgba(255, 217, 90, 0.45)';
        for (let i = 0; i < 5; i++) {
          ctx.fillRect(sbX + 12 + i * 24, sbY + 6, 14, 8);
        }
      }

      function drawBackWall() {
        ctx.fillStyle = getCSSVar('--stand-wall');
        ctx.fillRect(0, COURT.wallY, W, COURT.wallH);
        ctx.fillStyle = getCSSVar('--stand-wall-line');
        ctx.fillRect(0, COURT.wallY, W, 2);
      }

      function drawSurround() {
        // Green surround fills everything below the back wall — the
        // blue court will paint over it as a trapezoid.
        ctx.fillStyle = getCSSVar('--surround');
        ctx.fillRect(0, COURT.wallY + COURT.wallH, W, H - (COURT.wallY + COURT.wallH));

        // Subtle horizontal banding to give the surround a worn look
        ctx.fillStyle = getCSSVar('--surround-dark');
        ctx.globalAlpha = 0.32;
        ctx.fillRect(0, 152, W, 18);
        ctx.fillRect(0, 196, W, 22);
        ctx.globalAlpha = 1;
      }

      function drawCourt() {
        // Court trapezoid (blue hard court)
        const farLeftX = COURT.centerX - COURT.farHalfW;
        const farRightX = COURT.centerX + COURT.farHalfW;
        const nearLeftX = COURT.centerX - COURT.nearHalfW;
        const nearRightX = COURT.centerX + COURT.nearHalfW;

        ctx.fillStyle = getCSSVar('--court-blue');
        ctx.beginPath();
        ctx.moveTo(farLeftX, COURT.farBaselineY);
        ctx.lineTo(farRightX, COURT.farBaselineY);
        ctx.lineTo(nearRightX, COURT.nearBaselineY);
        ctx.lineTo(nearLeftX, COURT.nearBaselineY);
        ctx.closePath();
        ctx.fill();

        // Subtle darker band in the AI's back court for depth
        ctx.fillStyle = getCSSVar('--court-blue-dark');
        ctx.globalAlpha = 0.45;
        ctx.beginPath();
        const midServiceY = COURT.farServiceY;
        const midServiceHalfW = courtHalfWidthAtY(midServiceY);
        ctx.moveTo(farLeftX, COURT.farBaselineY);
        ctx.lineTo(farRightX, COURT.farBaselineY);
        ctx.lineTo(COURT.centerX + midServiceHalfW, midServiceY);
        ctx.lineTo(COURT.centerX - midServiceHalfW, midServiceY);
        ctx.closePath();
        ctx.fill();
        ctx.globalAlpha = 1;

        // ── Court lines ──
        ctx.strokeStyle = getCSSVar('--court-line');
        ctx.lineWidth = 2.5;

        // Far baseline
        ctx.beginPath();
        ctx.moveTo(farLeftX, COURT.farBaselineY);
        ctx.lineTo(farRightX, COURT.farBaselineY);
        ctx.stroke();

        // Near baseline (player side)
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(nearLeftX, COURT.nearBaselineY);
        ctx.lineTo(nearRightX, COURT.nearBaselineY);
        ctx.stroke();

        // Sidelines (converging toward vanishing point)
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.moveTo(nearLeftX, COURT.nearBaselineY);
        ctx.lineTo(farLeftX, COURT.farBaselineY);
        ctx.moveTo(nearRightX, COURT.nearBaselineY);
        ctx.lineTo(farRightX, COURT.farBaselineY);
        ctx.stroke();

        // Far service line
        ctx.lineWidth = 2;
        ctx.beginPath();
        const farSvcHalfW = courtHalfWidthAtY(COURT.farServiceY);
        ctx.moveTo(COURT.centerX - farSvcHalfW, COURT.farServiceY);
        ctx.lineTo(COURT.centerX + farSvcHalfW, COURT.farServiceY);
        ctx.stroke();

        // Near (player-side) service line
        ctx.lineWidth = 2.4;
        ctx.beginPath();
        const nearSvcHalfW = courtHalfWidthAtY(COURT.nearServiceY);
        ctx.moveTo(COURT.centerX - nearSvcHalfW, COURT.nearServiceY);
        ctx.lineTo(COURT.centerX + nearSvcHalfW, COURT.nearServiceY);
        ctx.stroke();

        // Center service line on the far side (between net and far service line)
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(COURT.centerX, COURT.netY);
        ctx.lineTo(COURT.centerX, COURT.farServiceY);
        ctx.stroke();

        // Center service line on the player's side (between net and near
        // service line) — drawn slightly fainter so it reads as a positioning
        // cue without competing with the foreground racket.
        ctx.strokeStyle = 'rgba(241, 237, 224, 0.78)';
        ctx.lineWidth = 2.2;
        ctx.beginPath();
        ctx.moveTo(COURT.centerX, COURT.netY);
        ctx.lineTo(COURT.centerX, COURT.nearServiceY);
        ctx.stroke();

        // Center mark at the far baseline (small tick)
        ctx.strokeStyle = getCSSVar('--court-line');
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(COURT.centerX, COURT.farBaselineY);
        ctx.lineTo(COURT.centerX, COURT.farBaselineY + 6);
        ctx.stroke();

        // Center mark at the near baseline (small tick — neutral stance cue)
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(COURT.centerX, COURT.nearBaselineY - 4);
        ctx.lineTo(COURT.centerX, COURT.nearBaselineY + 8);
        ctx.stroke();
      }

      function drawNet() {
        const netHalfW = courtHalfWidthAtY(COURT.netY);
        const leftX = COURT.centerX - netHalfW - COURT.netPostExtra;
        const rightX = COURT.centerX + netHalfW + COURT.netPostExtra;

        // Mesh body — translucent dark band, slightly tapered (taller at posts)
        ctx.fillStyle = getCSSVar('--net-mesh');
        ctx.beginPath();
        ctx.moveTo(leftX, COURT.netY);
        ctx.lineTo(rightX, COURT.netY);
        ctx.lineTo(rightX, COURT.netY + COURT.netMeshH + 4);
        ctx.lineTo(COURT.centerX, COURT.netY + COURT.netMeshH);
        ctx.lineTo(leftX, COURT.netY + COURT.netMeshH + 4);
        ctx.closePath();
        ctx.fill();

        // Mesh hatching — faint diagonal lines
        ctx.strokeStyle = 'rgba(15, 18, 22, 0.35)';
        ctx.lineWidth = 1;
        for (let x = leftX + 4; x < rightX; x += 8) {
          ctx.beginPath();
          ctx.moveTo(x, COURT.netY);
          ctx.lineTo(x, COURT.netY + COURT.netMeshH + 2);
          ctx.stroke();
        }

        // White tape along the top
        ctx.fillStyle = getCSSVar('--net-tape');
        ctx.fillRect(leftX, COURT.netY - COURT.netTapeH, rightX - leftX, COURT.netTapeH);

        // Net posts
        ctx.fillStyle = getCSSVar('--net-post');
        ctx.fillRect(leftX - 3, COURT.netY - COURT.netTapeH - 4, 4, COURT.netMeshH + 14);
        ctx.fillRect(rightX - 1, COURT.netY - COURT.netTapeH - 4, 4, COURT.netMeshH + 14);
      }

      function drawAIPlayer(bobOffset) {
        const x = COURT.aiX;
        const groundY = COURT.aiBaseY + bobOffset;
        const h = COURT.aiHeight;

        // Shadow
        ctx.fillStyle = 'rgba(0, 0, 0, 0.28)';
        ctx.beginPath();
        ctx.ellipse(x, groundY + 2, 14, 3.5, 0, 0, Math.PI * 2);
        ctx.fill();

        // Legs (shorts)
        ctx.fillStyle = getCSSVar('--ai-shorts');
        ctx.fillRect(x - 8, groundY - h * 0.5, 7, h * 0.32);
        ctx.fillRect(x + 1, groundY - h * 0.5, 7, h * 0.32);

        // Torso (white polo)
        ctx.fillStyle = getCSSVar('--ai-shirt');
        ctx.beginPath();
        ctx.moveTo(x - 11, groundY - h * 0.5);
        ctx.lineTo(x + 11, groundY - h * 0.5);
        ctx.lineTo(x + 9, groundY - h * 0.85);
        ctx.lineTo(x - 9, groundY - h * 0.85);
        ctx.closePath();
        ctx.fill();

        // Shoulder shading
        ctx.fillStyle = getCSSVar('--ai-shirt-dark');
        ctx.globalAlpha = 0.5;
        ctx.fillRect(x - 11, groundY - h * 0.85, 22, 2);
        ctx.globalAlpha = 1;

        // Head
        ctx.fillStyle = getCSSVar('--player-skin');
        ctx.beginPath();
        ctx.arc(x, groundY - h * 0.92, 5, 0, Math.PI * 2);
        ctx.fill();

        // Racket arm (down at side, racket head visible)
        ctx.strokeStyle = getCSSVar('--ai-shirt');
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.moveTo(x + 10, groundY - h * 0.78);
        ctx.lineTo(x + 16, groundY - h * 0.4);
        ctx.stroke();

        // Tiny racket head (oval)
        ctx.fillStyle = getCSSVar('--racket-frame');
        ctx.beginPath();
        ctx.ellipse(x + 18, groundY - h * 0.35, 4, 6, 0.2, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = getCSSVar('--racket-string');
        ctx.beginPath();
        ctx.ellipse(x + 18, groundY - h * 0.35, 2.6, 4.4, 0.2, 0, Math.PI * 2);
        ctx.fill();
      }

      function drawPlayerSilhouette(bobOffset) {
        // Back of player — shoulders, head, partial racket arm extending
        // out and forward into the court. Bob offset slightly stronger
        // than the AI for a more present "we're alive" feel.
        const cx = COURT.playerCenterX;
        const headY = COURT.playerHeadY + bobOffset;

        // Shoulders / upper back — wide trapezoid that fans out toward
        // the bottom edge of frame.
        ctx.fillStyle = getCSSVar('--player-shirt');
        ctx.beginPath();
        ctx.moveTo(cx - 70, headY + 18);
        ctx.lineTo(cx + 70, headY + 18);
        ctx.lineTo(cx + 130, H + 8);
        ctx.lineTo(cx - 130, H + 8);
        ctx.closePath();
        ctx.fill();

        // Shadow band along the bottom for solidity
        ctx.fillStyle = getCSSVar('--player-shirt-dark');
        ctx.globalAlpha = 0.55;
        ctx.fillRect(cx - 130, H - 26, 260, 26);
        ctx.globalAlpha = 1;

        // Neck
        ctx.fillStyle = getCSSVar('--player-skin');
        ctx.fillRect(cx - 8, headY + 6, 16, 14);

        // Back of head
        ctx.fillStyle = getCSSVar('--player-hair');
        ctx.beginPath();
        ctx.ellipse(cx, headY - 4, 22, 24, 0, 0, Math.PI * 2);
        ctx.fill();

        // A small skin sliver behind the ear-line for depth
        ctx.fillStyle = getCSSVar('--player-skin');
        ctx.beginPath();
        ctx.ellipse(cx - 18, headY + 4, 4, 6, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(cx + 18, headY + 4, 4, 6, 0, 0, Math.PI * 2);
        ctx.fill();

        // Hands resting on the bottom edge of frame — placeholders that
        // anchor the player to the foreground without visually competing
        // with the floating racket above.
        ctx.fillStyle = getCSSVar('--player-skin');
        ctx.beginPath();
        ctx.ellipse(cx - 64, H - 8, 16, 9, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.ellipse(cx + 64, H - 8, 16, 9, 0, 0, Math.PI * 2);
        ctx.fill();
      }

      /* ── Floating racket — cursor-controlled hit element ──────── */
      function drawRacket(x, y, swingT) {
        ctx.save();
        ctx.translate(x, y);

        // Drop shadow on the court behind the racket — sells the height
        ctx.fillStyle = 'rgba(0, 0, 0, 0.32)';
        ctx.beginPath();
        ctx.ellipse(2, 64, 22, 4, 0, 0, Math.PI * 2);
        ctx.fill();

        // Swing flash — bright halo around the racket head when a click fires.
        if (swingT > 0) {
          ctx.globalAlpha = swingT * 0.85;
          ctx.strokeStyle = 'rgba(255, 255, 240, 0.9)';
          ctx.lineWidth = 4 + swingT * 6;
          ctx.beginPath();
          ctx.ellipse(0, 0, 32 + swingT * 8, 38 + swingT * 8, 0, 0, Math.PI * 2);
          ctx.stroke();
          ctx.globalAlpha = 1;
        }

        // Grip (held by the player below frame)
        ctx.fillStyle = getCSSVar('--racket-grip');
        ctx.fillRect(-5, 42, 10, 38);
        ctx.strokeStyle = 'rgba(0, 0, 0, 0.45)';
        ctx.lineWidth = 1;
        for (let g = 48; g <= 76; g += 5) {
          ctx.beginPath();
          ctx.moveTo(-5, g);
          ctx.lineTo(5, g);
          ctx.stroke();
        }

        // Throat (yoke)
        ctx.fillStyle = getCSSVar('--racket-frame');
        ctx.beginPath();
        ctx.moveTo(-6, 42);
        ctx.lineTo(6, 42);
        ctx.lineTo(10, 30);
        ctx.lineTo(-10, 30);
        ctx.closePath();
        ctx.fill();

        // Frame (outer oval)
        ctx.fillStyle = getCSSVar('--racket-frame');
        ctx.beginPath();
        ctx.ellipse(0, 0, 28, 34, 0, 0, Math.PI * 2);
        ctx.fill();

        // Strings (inner)
        ctx.fillStyle = getCSSVar('--racket-string');
        ctx.beginPath();
        ctx.ellipse(0, 0, 23, 29, 0, 0, Math.PI * 2);
        ctx.fill();

        // String hatching
        ctx.strokeStyle = 'rgba(40, 30, 20, 0.5)';
        ctx.lineWidth = 0.8;
        ctx.save();
        ctx.beginPath();
        ctx.ellipse(0, 0, 22, 28, 0, 0, Math.PI * 2);
        ctx.clip();
        for (let i = -22; i <= 22; i += 4) {
          ctx.beginPath();
          ctx.moveTo(i, -29);
          ctx.lineTo(i, 29);
          ctx.stroke();
        }
        for (let j = -28; j <= 28; j += 4) {
          ctx.beginPath();
          ctx.moveTo(-23, j);
          ctx.lineTo(23, j);
          ctx.stroke();
        }
        ctx.restore();

        ctx.restore();
      }

      /* ── Incoming ball + halo timing ring ───────────────────── */
      function drawBall(state) {
        const { x, y, linY, r, haloR, color } = state;

        // Ground shadow under the ball, projected to its straight-line
        // (no-arc) Y so the ball appears to lift off and come back down.
        ctx.fillStyle = 'rgba(0, 0, 0, 0.32)';
        ctx.beginPath();
        ctx.ellipse(x, linY + r * 0.4, r * 0.85, r * 0.32, 0, 0, Math.PI * 2);
        ctx.fill();

        // Halo ring — contracts as the swing moment approaches.
        // Alpha ramps up so the late-flight ring reads stronger.
        const alpha = 0.28 + state.t * 0.55;
        ctx.strokeStyle = `rgba(255, 255, 255, ${alpha.toFixed(3)})`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(x, y, haloR, 0, Math.PI * 2);
        ctx.stroke();

        // Inner color tick on the halo so the player's eye keeps the
        // color identity locked even as the ring contracts.
        ctx.strokeStyle = COLOR_HEX[color];
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.arc(x, y, haloR, -0.45, 0.45);
        ctx.stroke();

        // Ball body — fully tinted so color reads at any distance.
        ctx.fillStyle = COLOR_HEX[color];
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();

        // Specular highlight
        ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
        ctx.beginPath();
        ctx.arc(x - r * 0.32, y - r * 0.32, r * 0.4, 0, Math.PI * 2);
        ctx.fill();

        // Outer rim for a touch of depth
        ctx.strokeStyle = 'rgba(0, 0, 0, 0.35)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.stroke();
      }

      /* ── Cursor reticle ──────────────────────────────────────── */
      function drawCursor(x, y) {
        ctx.save();
        // Soft drop shadow for legibility against the court
        ctx.fillStyle = 'rgba(0, 0, 0, 0.45)';
        ctx.beginPath();
        ctx.arc(x + 1, y + 1, 4.5, 0, Math.PI * 2);
        ctx.fill();

        // Outer ring
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.92)';
        ctx.lineWidth = 1.6;
        ctx.beginPath();
        ctx.arc(x, y, 11, 0, Math.PI * 2);
        ctx.stroke();

        // Center dot
        ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
        ctx.beginPath();
        ctx.arc(x, y, 3, 0, Math.PI * 2);
        ctx.fill();

        // Crosshair ticks
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.7)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(x - 17, y);
        ctx.lineTo(x - 13, y);
        ctx.moveTo(x + 13, y);
        ctx.lineTo(x + 17, y);
        ctx.moveTo(x, y - 17);
        ctx.lineTo(x, y - 13);
        ctx.moveTo(x, y + 13);
        ctx.lineTo(x, y + 17);
        ctx.stroke();
        ctx.restore();
      }

      /* ── Render loop ─────────────────────────────────────────── */
      function render(ts) {
        const t = ts / 1000;
        const playerBob = Math.sin(t * 1.6) * 1.4;
        const aiBob = Math.sin(t * 1.3 + 0.7) * 1.1;
        const racketBob = Math.sin(t * 1.6) * 1.6;

        tickRallyState(ts);
        racketX += (cursor.x - racketX) * RACKET_LERP;
        if (racketSwingT > 0) racketSwingT = Math.max(0, racketSwingT - 0.06);

        const ballState = getBallState(ts);
        const ballPastNet = ballState && ballState.linY > COURT.netY;

        ctx.fillStyle = getCSSVar('--court-frame');
        ctx.fillRect(0, 0, W, H);

        drawSky();
        drawBackWall();
        drawCrowd();
        drawSurround();
        drawCourt();
        drawAIPlayer(aiBob);
        if (ballState && !ballPastNet) drawBall(ballState);
        drawNet();
        if (ballState && ballPastNet) drawBall(ballState);
        drawRacket(racketX, COURT.racketY + racketBob, racketSwingT);
        drawPlayerSilhouette(playerBob);
        drawCursor(cursor.x, cursor.y);
      }

      function loop(ts) {
        render(ts);
        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);
    </script>
  </body>
</html>
