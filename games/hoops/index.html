<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BCI Hoops — BCI Arcade</title>
    <style>
      :root {
        --bg-page: #0d1117;
        --bg-card: #1a222d;
        --bg-card-hover: #222c3a;
        --bg-badge-dim: #1f2630;
        --border: #2d333b;
        --border-strong: #3a4150;

        --text-primary: #e8e4d9;
        --text-muted: #9aa4b1;
        --text-dim: #5d6670;

        --click-blue: #4488ff;
        --click-orange: #ff8833;
        --click-purple: #aa44ff;

        --good: #5fbf6e;
        --bad: #d44b4b;

        /* Gym palette — fully themed environment, no BCI palette here */
        --gym-floor: #8a5a2b;
        --gym-floor-dark: #5b3a1a;
        --gym-floor-line: #d8a86a;
        --gym-wall: #14191f;
        --gym-crowd: #2a2f38;
        --gym-spot: rgba(255, 220, 160, 0.18);

        --backboard: #f3eee2;
        --backboard-edge: #b8b0a0;
        --backboard-square: #2a2f38;
        --rim-shadow: #0a0d10;
        --net-color: #f3eee2;
        --ball-orange: #d97a2c;
        --ball-orange-dark: #8d4a17;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: var(--bg-page);
        min-height: 100vh;
        font-family: 'Courier New', monospace;
        color: var(--text-primary);
        user-select: none;
        overflow: hidden;
      }

      #fit-wrap {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #game-wrapper {
        width: 900px;
        height: 700px;
        position: relative;
        transform-origin: center center;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      /* ── Header ──────────────────────────────────────────────── */
      .game-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 18px;
        padding: 12px 16px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 8px;
        height: 64px;
        flex-shrink: 0;
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .back-btn {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text-muted);
        font-family: inherit;
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        padding: 8px 13px;
        cursor: pointer;
        transition:
          color 0.15s,
          border-color 0.15s,
          background 0.15s;
      }
      .back-btn:hover {
        color: var(--text-primary);
        border-color: var(--click-blue);
        background: var(--bg-card-hover);
      }

      .title-block .game-title {
        font-size: 18px;
        font-weight: bold;
        letter-spacing: 4px;
        text-transform: uppercase;
      }
      .title-block .game-subtitle {
        font-size: 9px;
        color: var(--text-muted);
        letter-spacing: 3px;
        text-transform: uppercase;
        margin-top: 3px;
      }

      .hud {
        display: flex;
        align-items: center;
        gap: 22px;
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text-muted);
      }
      .hud-stat {
        display: flex;
        flex-direction: column;
        gap: 2px;
        align-items: center;
        min-width: 56px;
      }
      .hud-label {
        font-size: 9px;
        color: var(--text-dim);
      }
      .hud-value {
        font-size: 16px;
        font-weight: bold;
        color: var(--text-primary);
        font-family: inherit;
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .icon-btn {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text-muted);
        font-family: inherit;
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        padding: 8px 13px;
        cursor: pointer;
        transition:
          color 0.15s,
          border-color 0.15s,
          background 0.15s;
      }
      .icon-btn:hover {
        color: var(--text-primary);
        border-color: var(--border-strong);
        background: var(--bg-card-hover);
      }

      /* ── Canvas + court frame ────────────────────────────────── */
      .court-frame {
        position: relative;
        flex: 1;
        background: var(--gym-wall);
        border: 1px solid var(--border-strong);
        border-radius: 8px;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      canvas {
        display: block;
        cursor: none;
      }

      /* ── Bottom bar ──────────────────────────────────────────── */
      .bottom-bar {
        height: 88px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 8px;
        gap: 18px;
      }
      .bb-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .status-msg {
        font-size: 12px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text-muted);
      }
      .status-msg .accent {
        color: var(--text-primary);
      }
      .home-slot {
        display: flex;
        align-items: center;
      }

      /* ── Round-end results overlay ───────────────────────────── */
      .results-overlay {
        display: none;
        position: absolute;
        inset: 0;
        background: rgba(13, 17, 23, 0.82);
        backdrop-filter: blur(4px);
        align-items: center;
        justify-content: center;
        z-index: 6;
      }
      .results-overlay.is-visible {
        display: flex;
      }
      .results-card {
        background: var(--bg-card);
        border: 1px solid var(--border-strong);
        border-radius: 10px;
        padding: 26px 36px 28px;
        display: flex;
        flex-direction: column;
        gap: 22px;
        align-items: center;
        min-width: 400px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.55);
      }
      .results-title {
        font-size: 14px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--text-primary);
        font-weight: bold;
      }
      .results-grid {
        display: flex;
        gap: 28px;
      }
      .results-stat {
        display: flex;
        flex-direction: column;
        gap: 6px;
        align-items: center;
        min-width: 96px;
      }
      .results-stat-label {
        font-size: 9px;
        color: var(--text-dim);
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      .results-stat-value {
        font-size: 22px;
        font-weight: bold;
        color: var(--text-primary);
      }
      .results-buttons {
        display: flex;
        gap: 12px;
      }
      .results-btn {
        background: var(--bg-card-hover);
        border: 1px solid var(--border-strong);
        border-radius: 6px;
        color: var(--text-primary);
        font-family: inherit;
        font-size: 12px;
        font-weight: bold;
        letter-spacing: 2px;
        text-transform: uppercase;
        padding: 12px 22px;
        cursor: pointer;
        transition:
          background 0.15s,
          border-color 0.15s,
          color 0.15s;
      }
      .results-btn:hover {
        background: var(--bg-card);
        border-color: var(--click-blue);
      }
      .results-btn--ghost {
        background: transparent;
        color: var(--text-muted);
      }
      .results-btn--ghost:hover {
        color: var(--text-primary);
        border-color: var(--border-strong);
      }

      /* ── Mode select overlay ─────────────────────────────────── */
      .mode-overlay {
        display: none;
        position: absolute;
        inset: 0;
        background: rgba(13, 17, 23, 0.85);
        backdrop-filter: blur(4px);
        align-items: center;
        justify-content: center;
        z-index: 7;
      }
      .mode-overlay.is-visible {
        display: flex;
      }
      .mode-card {
        background: var(--bg-card);
        border: 1px solid var(--border-strong);
        border-radius: 10px;
        padding: 28px 36px;
        display: flex;
        flex-direction: column;
        gap: 22px;
        align-items: center;
        min-width: 480px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.55);
      }
      .mode-title {
        font-size: 14px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--text-primary);
        font-weight: bold;
      }
      .mode-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        width: 100%;
      }
      .mode-btn {
        background: var(--bg-card-hover);
        border: 1px solid var(--border-strong);
        border-radius: 8px;
        color: var(--text-primary);
        font-family: inherit;
        cursor: pointer;
        padding: 18px 18px 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        align-items: flex-start;
        text-align: left;
        transition:
          background 0.15s,
          border-color 0.15s,
          transform 0.12s;
      }
      .mode-btn:hover {
        background: var(--bg-card);
        border-color: var(--click-orange);
        transform: translateY(-1px);
      }
      .mode-btn-name {
        font-size: 13px;
        font-weight: bold;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: var(--text-primary);
      }
      .mode-btn-desc {
        font-size: 10px;
        letter-spacing: 1px;
        color: var(--text-muted);
        line-height: 1.5;
      }

      /* ── Settings modal ──────────────────────────────────────── */
      .settings-modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        align-items: center;
        justify-content: center;
        z-index: 20;
      }
      .settings-modal.is-visible {
        display: flex;
      }
      .settings-card {
        background: var(--bg-card);
        border: 1px solid var(--border-strong);
        border-radius: 10px;
        padding: 26px 32px 24px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        min-width: 380px;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.55);
      }
      .settings-card-title {
        font-size: 13px;
        letter-spacing: 4px;
        text-transform: uppercase;
        color: var(--text-primary);
        font-weight: bold;
      }
      .settings-row {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .settings-row-label {
        font-size: 10px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text-muted);
        display: flex;
        justify-content: space-between;
      }
      .settings-row-label .accent {
        color: var(--text-primary);
      }
      .settings-slider {
        width: 100%;
        accent-color: var(--click-orange);
      }
      .settings-buttons {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .settings-btn {
        background: var(--bg-card-hover);
        border: 1px solid var(--border-strong);
        border-radius: 6px;
        color: var(--text-primary);
        font-family: inherit;
        font-size: 11px;
        font-weight: bold;
        letter-spacing: 2px;
        text-transform: uppercase;
        padding: 10px 16px;
        cursor: pointer;
        flex: 1;
        min-width: 100px;
        transition:
          background 0.15s,
          border-color 0.15s,
          color 0.15s;
      }
      .settings-btn:hover {
        background: var(--bg-card);
        border-color: var(--click-blue);
      }
      .settings-btn--ghost {
        color: var(--text-muted);
        background: transparent;
      }
      .settings-btn--ghost:hover {
        color: var(--text-primary);
      }
    </style>
  </head>

  <body oncontextmenu="return false;">
    <div id="fit-wrap">
      <div id="game-wrapper">
        <header class="game-header">
          <div class="header-left">
            <button class="back-btn" id="btn-back">&larr; Arcade</button>
            <div class="title-block">
              <div class="game-title">BCI Hoops</div>
              <div class="game-subtitle">Free Throw &middot; Three-Point</div>
            </div>
          </div>

          <div class="hud">
            <div class="hud-stat">
              <span class="hud-label">Shot</span>
              <span class="hud-value" id="hud-shot">— / —</span>
            </div>
            <div class="hud-stat">
              <span class="hud-label">Score</span>
              <span class="hud-value" id="hud-score">0</span>
            </div>
            <div class="hud-stat">
              <span class="hud-label">Streak</span>
              <span class="hud-value" id="hud-streak">0</span>
            </div>
          </div>

          <div class="header-right">
            <button class="icon-btn" id="btn-settings">Settings</button>
          </div>
        </header>

        <div class="court-frame">
          <canvas id="canvas" width="800" height="540"></canvas>
          <div class="results-overlay" id="results-overlay">
            <div class="results-card">
              <div class="results-title">Round Complete</div>
              <div class="results-grid">
                <div class="results-stat">
                  <div class="results-stat-label">Made</div>
                  <div class="results-stat-value" id="results-made">0 / 10</div>
                </div>
                <div class="results-stat">
                  <div class="results-stat-label">Accuracy</div>
                  <div class="results-stat-value" id="results-acc">0%</div>
                </div>
                <div class="results-stat">
                  <div class="results-stat-label">Best Streak</div>
                  <div class="results-stat-value" id="results-streak">0</div>
                </div>
              </div>
              <div class="results-buttons">
                <button class="results-btn" id="btn-play-again">Play Again</button>
                <button class="results-btn results-btn--ghost" id="btn-results-modes">
                  Mode Select
                </button>
                <button class="results-btn results-btn--ghost" id="btn-results-home">Home</button>
              </div>
            </div>
          </div>

          <div class="mode-overlay" id="mode-overlay">
            <div class="mode-card">
              <div class="mode-title">Select Mode</div>
              <div class="mode-grid">
                <button class="mode-btn" data-mode="ft">
                  <div class="mode-btn-name">Free Throw</div>
                  <div class="mode-btn-desc">15 ft &middot; baseline timing &middot; 10 shots</div>
                </button>
                <button class="mode-btn" data-mode="threePt">
                  <div class="mode-btn-name">Three-Point</div>
                  <div class="mode-btn-desc">
                    Pulled-back camera &middot; longer flight &middot; 10 shots
                  </div>
                </button>
              </div>
            </div>
          </div>
        </div>

        <div class="bottom-bar">
          <div class="bb-content">
            <div class="status-msg" id="status-msg">
              <span class="accent">Hoops v1</span> &middot; gym scene online &middot; rim rotation
              comes online next
            </div>
          </div>
          <div class="home-slot" id="home-slot"></div>
        </div>
      </div>
    </div>

    <div class="settings-modal" id="settings-modal">
      <div class="settings-card">
        <div class="settings-card-title">Settings</div>
        <div class="settings-row">
          <div class="settings-row-label">
            <span>Cursor Sensitivity</span>
            <span class="accent" id="settings-sens-val">1.00&times;</span>
          </div>
          <input
            class="settings-slider"
            id="settings-sens-slider"
            type="range"
            min="25"
            max="200"
            step="5"
            value="100"
          />
        </div>
        <div class="settings-buttons">
          <button class="settings-btn" id="settings-replay">Replay Round</button>
          <button class="settings-btn" id="settings-modes">Mode Select</button>
        </div>
        <div class="settings-buttons">
          <button class="settings-btn settings-btn--ghost" id="settings-reset">
            Reset Defaults
          </button>
          <button class="settings-btn settings-btn--ghost" id="settings-close">Close</button>
        </div>
      </div>
    </div>

    <script src="../../shared/bci-input.js"></script>
    <script src="../../shared/bci-settings.js"></script>
    <script src="../../shared/bci-analytics.js"></script>
    <script src="../../shared/bci-shell.js"></script>
    <script>
      'use strict';

      const GAME_ID = 'hoops';

      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const W = canvas.width;
      const H = canvas.height;

      /* Header buttons */
      document.getElementById('btn-back').addEventListener('click', () => {
        BCI.goToLauncher();
      });

      /* Home button slot — uses the shared component */
      document.getElementById('home-slot').appendChild(BCI.createHomeButton({ showLabel: true }));

      /* ── Scene geometry ────────────────────────────────────────
         All positions in canvas-local coords. Free-throw camera by
         default; checkpoint 9 will pull the camera back for 3PT by
         scaling SCENE.scale and adjusting the launch point. */
      const SCENE = {
        /* Hoop placement — rim center is the geometric anchor for
           rim drawing, rotation, and (later) hit detection. */
        hoopX: 400,
        hoopY: 218,

        /* Mildly flattened rim ellipse — keeps the gym 3D read but
           still legible as a "clock face" once the colored arcs ride
           around the ring in checkpoint 4. */
        rimRx: 70,
        rimRy: 18,
        rimThickness: 6,

        /* Backboard rectangle (centered above the rim). */
        boardW: 220,
        boardH: 130,
        boardYTop: 78,

        /* Net hangs straight down from the rim. */
        netDrop: 56,

        /* Floor / wall split — wall above, hardwood below. */
        floorY: 330,

        /* Free-throw launch point for the ball. */
        launchX: 400,
        launchY: 488,
        ballR: 18,
      };

      /* Virtual cursor — checkpoint 3 will draw a proper reticle on top of it */
      const settings = BCI.getEffectiveSettings(GAME_ID);
      const virtualCursor = BCI.createVirtualCursor(canvas, {
        sensitivity: settings.cursorSensitivity,
        startX: W / 2,
        startY: SCENE.hoopY,
      });

      /* ── Scene rendering ───────────────────────────────────────
         Pure draw functions, no game state. Checkpoint 4 will add a
         rotating-rim variant; everything else here stays static. */

      function drawWall() {
        const grad = ctx.createLinearGradient(0, 0, 0, SCENE.floorY);
        grad.addColorStop(0, '#0a0d12');
        grad.addColorStop(1, '#161b22');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, SCENE.floorY);
      }

      function drawCrowd() {
        /* Two rows of dim head-and-shoulders silhouettes against the
           back wall. Seeded values so the crowd doesn't shimmer. */
        const rows = [
          { y: SCENE.floorY - 28, count: 22, scale: 1.0, alpha: 0.55 },
          { y: SCENE.floorY - 56, count: 18, scale: 0.9, alpha: 0.35 },
        ];
        ctx.fillStyle = '#000';
        for (const row of rows) {
          ctx.globalAlpha = row.alpha;
          for (let i = 0; i < row.count; i++) {
            const t = (i + 0.5) / row.count;
            /* Stable pseudo-random jitter so each head sits a little
               differently. */
            const jitter = Math.sin(i * 12.9898 + row.y) * 0.5;
            const x = t * W + jitter * 8;
            const headR = 7 * row.scale;
            const shoulderW = 22 * row.scale;
            const shoulderH = 14 * row.scale;
            /* Head */
            ctx.beginPath();
            ctx.arc(x, row.y - shoulderH * 0.4, headR, 0, Math.PI * 2);
            ctx.fill();
            /* Shoulders */
            ctx.beginPath();
            ctx.ellipse(x, row.y, shoulderW / 2, shoulderH / 2, 0, 0, Math.PI * 2);
            ctx.fill();
          }
        }
        ctx.globalAlpha = 1;
      }

      function drawSpotlight() {
        /* Warm radial light centered on the rim, fades out. Drawn
           after the wall/crowd so it lifts the hoop area. */
        const grad = ctx.createRadialGradient(
          SCENE.hoopX,
          SCENE.hoopY - 10,
          20,
          SCENE.hoopX,
          SCENE.hoopY - 10,
          340
        );
        grad.addColorStop(0, 'rgba(255, 220, 160, 0.22)');
        grad.addColorStop(0.55, 'rgba(255, 200, 130, 0.07)');
        grad.addColorStop(1, 'rgba(255, 200, 130, 0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, SCENE.floorY + 40);
      }

      function drawFloor() {
        /* Hardwood band with simple perspective: a darker far edge at
           SCENE.floorY, lighter as it comes forward. Plank lines fan
           out from a vanishing point above the rim. */
        const floorTop = SCENE.floorY;
        const grad = ctx.createLinearGradient(0, floorTop, 0, H);
        grad.addColorStop(0, '#5b3a1a');
        grad.addColorStop(0.4, '#7a4f24');
        grad.addColorStop(1, '#8a5a2b');
        ctx.fillStyle = grad;
        ctx.fillRect(0, floorTop, W, H - floorTop);

        /* Plank lines — fan from vanishing point at (hoopX, hoopY-30). */
        const vpX = SCENE.hoopX;
        const vpY = SCENE.hoopY - 30;
        ctx.strokeStyle = 'rgba(40, 22, 8, 0.45)';
        ctx.lineWidth = 1;
        const planks = 11;
        for (let i = 0; i <= planks; i++) {
          const t = i / planks;
          const xBottom = -W * 0.1 + t * (W * 1.2);
          ctx.beginPath();
          ctx.moveTo(vpX + (xBottom - vpX) * 0.18, floorTop);
          ctx.lineTo(xBottom, H);
          ctx.stroke();
        }

        /* Free-throw line — subtle painted arc on the floor, just
           behind the launch point so it reads as "this is where the
           shot starts." */
        ctx.strokeStyle = 'rgba(216, 168, 106, 0.55)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(SCENE.launchX, SCENE.launchY + 6, 92, 14, 0, Math.PI, Math.PI * 2);
        ctx.stroke();
      }

      function drawBackboardAndNet() {
        const cx = SCENE.hoopX;
        const top = SCENE.boardYTop;
        const w = SCENE.boardW;
        const h = SCENE.boardH;

        /* Backboard plate */
        ctx.fillStyle = '#f3eee2';
        ctx.fillRect(cx - w / 2, top, w, h);

        /* Backboard edge shadow */
        ctx.strokeStyle = '#b8b0a0';
        ctx.lineWidth = 2;
        ctx.strokeRect(cx - w / 2, top, w, h);

        /* Inner shot square (the painted target on the glass) */
        const sqW = 78;
        const sqH = 56;
        ctx.strokeStyle = '#2a2f38';
        ctx.lineWidth = 3;
        ctx.strokeRect(cx - sqW / 2, top + h - sqH - 14, sqW, sqH);

        /* Pole/mount stub behind the backboard, just for depth */
        ctx.fillStyle = '#1a1f26';
        ctx.fillRect(cx - 6, top - 8, 12, 8);

        /* Net — inverted V-mesh hanging from the rim front edge */
        const rimY = SCENE.hoopY;
        const rimRx = SCENE.rimRx;
        const netBottomW = rimRx * 1.05;
        const netBottomY = rimY + SCENE.netDrop;

        ctx.strokeStyle = 'rgba(243, 238, 226, 0.85)';
        ctx.lineWidth = 1.4;

        const cords = 9;
        for (let i = 0; i <= cords; i++) {
          const t = i / cords;
          const xTop = cx - rimRx + t * rimRx * 2;
          const xBottom = cx - netBottomW + t * netBottomW * 2 * 0.85;
          ctx.beginPath();
          ctx.moveTo(xTop, rimY);
          ctx.lineTo(xBottom, netBottomY);
          ctx.stroke();
        }
        /* Two horizontal bands across the net for the mesh feel */
        for (let band = 1; band <= 2; band++) {
          const t = band / 3;
          const y = rimY + t * SCENE.netDrop;
          const halfW = rimRx + (netBottomW - rimRx) * t * 0.85;
          ctx.beginPath();
          ctx.moveTo(cx - halfW, y);
          ctx.lineTo(cx + halfW, y);
          ctx.stroke();
        }
      }

      /* ── Click colors / zones ─────────────────────────────────
         The rim is divided into three angular zones. Zone i = ZONE_ORDER[i].
         All zones rotate together around the rim center driven by rimAngle.
         Click colors map: left = blue, middle = purple, right = orange
         (per BCI.CLICKS). */
      const COLOR_HEX = {
        blue: '#4488ff',
        orange: '#ff8833',
        purple: '#aa44ff',
      };
      const ZONE_ORDER = ['blue', 'orange', 'purple'];

      function clickIdToColorName(id) {
        if (id === 0) return 'blue'; // left click
        if (id === 1) return 'purple'; // middle click
        if (id === 2) return 'orange'; // right click
        return null;
      }

      /* ── Game state machine ───────────────────────────────────
         AIMING — rim spinning, waiting for click on rim.
         SHOOTING — ball in flight (~300ms), no input accepted.
         RESOLVING — outcome flash; rim keeps rotating; brief pause.
         ROUND_END — results overlay shown; loop still ticks for the
                     visual but no shots happen. */
      const STATE = {
        MODE_SELECT: 'mode_select',
        AIMING: 'aiming',
        SHOOTING: 'shooting',
        RESOLVING: 'resolving',
        ROUND_END: 'round_end',
      };

      const ROUND_SHOTS = 10;
      const RESOLVE_MS = 700;
      const FLASH_MS = 500;
      const RIM_SPEED_BASE = 0.55; // rad/s baseline — modulated by ramp + mode
      const RIM_SPEED_RAMP_PER_SHOT = 0.13; // shot 10 = 2.17× shot 1

      /* ── Modes ────────────────────────────────────────────────
         Each mode overrides scene + flight tunables. Free Throw is
         the baseline; Three-Point pulls the launch point back, shrinks
         the rim slightly, and lengthens the flight so prediction
         pressure goes up even before the difficulty ramp kicks in. */
      const MODES = {
        ft: {
          name: 'Free Throw',
          launchX: 400,
          launchY: 488,
          rimRx: 70,
          rimRy: 18,
          flightMs: 300,
          rimSpeedMul: 1.0,
        },
        threePt: {
          name: 'Three-Point',
          launchX: 400,
          launchY: 514,
          rimRx: 60,
          rimRy: 16,
          flightMs: 420,
          rimSpeedMul: 1.0,
        },
      };

      let activeMode = 'ft'; // changes via mode select
      let currentFlightMs = MODES.ft.flightMs;

      function applyMode(modeId) {
        activeMode = modeId;
        const m = MODES[modeId];
        SCENE.launchX = m.launchX;
        SCENE.launchY = m.launchY;
        SCENE.rimRx = m.rimRx;
        SCENE.rimRy = m.rimRy;
        currentFlightMs = m.flightMs;
      }

      let gameState = STATE.MODE_SELECT;
      let lastFrameMs = performance.now();
      let rimAngle = 0;

      let shotIndex = 0; // 0..ROUND_SHOTS-1
      let score = 0;
      let miss = 0;
      let streak = 0;
      let longestStreak = 0;

      let shot = null; // { startedAt, fromX, fromY, toX, toY, targetAngle, clickColor, clickId, outcome, resolvedAt }
      let flashAt = 0;
      let flashType = null; // 'make' | 'miss' | null

      /* Analytics — separate session per round, separate game id per
         mode so all-time totals stay clean. */
      let analyticsSession = null;
      let aimingStartedAt = 0;
      function analyticsGameId() {
        return activeMode === 'ft' ? 'hoops-ft' : 'hoops-3pt';
      }

      /* ── Geometry helpers ─────────────────────────────────────
         cursorRimInfo: convert a screen point into ellipse-parametric
         (angle, normalized distance) so we can answer "is this on the
         rim?" and "which zone is under it?" with the same math the
         renderer uses. */
      function cursorRimInfo() {
        const dx = (virtualCursor.x - SCENE.hoopX) / SCENE.rimRx;
        const dy = (virtualCursor.y - SCENE.hoopY) / SCENE.rimRy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const angle = Math.atan2(dy, dx);
        /* Forgiving on-rim band — cursor doesn't have to land exactly
           on the ring, just inside the rim's catch zone. */
        const onRim = dist >= 0.55 && dist <= 1.4;
        return { angle, dist, onRim };
      }

      function zoneColorAt(angleParam) {
        let a = (angleParam - rimAngle) % (Math.PI * 2);
        if (a < 0) a += Math.PI * 2;
        const idx = Math.floor(a / ((Math.PI * 2) / 3));
        return ZONE_ORDER[idx % 3];
      }

      /* ── Rendering ───────────────────────────────────────────── */

      function drawRimRotating() {
        const cx = SCENE.hoopX;
        const cy = SCENE.hoopY;
        const rx = SCENE.rimRx;
        const ry = SCENE.rimRy;

        /* Drop shadow on the floor below the rim */
        ctx.fillStyle = 'rgba(10, 13, 16, 0.4)';
        ctx.beginPath();
        ctx.ellipse(cx, cy + 4, rx + 2, ry + 2, 0, 0, Math.PI * 2);
        ctx.fill();

        /* Three colored arcs — one per zone, each spans 2π/3 of the
           ellipse parametric circle, all sliding together as rimAngle
           advances. */
        ctx.lineWidth = SCENE.rimThickness;
        for (let i = 0; i < 3; i++) {
          const startAngle = rimAngle + (i * 2 * Math.PI) / 3;
          const endAngle = rimAngle + ((i + 1) * 2 * Math.PI) / 3;
          ctx.strokeStyle = COLOR_HEX[ZONE_ORDER[i]];
          ctx.beginPath();
          ctx.ellipse(cx, cy, rx, ry, 0, startAngle, endAngle);
          ctx.stroke();
        }

        /* Inner highlight (lower half) — adds a touch of dimension
           without competing with the click colors. */
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.18)';
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI);
        ctx.stroke();
      }

      function drawBallAt(x, y, r) {
        /* Ground shadow only when ball is near the floor — fades as
           the ball lifts. */
        const shadowAlpha = Math.max(0, 0.45 * (1 - Math.abs(SCENE.launchY - y) / 240));
        if (shadowAlpha > 0.02) {
          ctx.fillStyle = `rgba(10, 13, 16, ${shadowAlpha})`;
          ctx.beginPath();
          ctx.ellipse(x, SCENE.launchY + r * 0.85, r * 0.85, r * 0.25, 0, 0, Math.PI * 2);
          ctx.fill();
        }

        /* Ball body */
        const grad = ctx.createRadialGradient(x - r * 0.35, y - r * 0.35, r * 0.2, x, y, r);
        grad.addColorStop(0, '#f0a55a');
        grad.addColorStop(0.6, '#d97a2c');
        grad.addColorStop(1, '#8d4a17');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();

        /* Seam lines */
        ctx.strokeStyle = 'rgba(40, 22, 8, 0.85)';
        ctx.lineWidth = Math.max(1, r * 0.08);
        ctx.beginPath();
        ctx.moveTo(x - r, y);
        ctx.lineTo(x + r, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(x, y, r, Math.PI * 0.15, Math.PI - Math.PI * 0.15);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(x, y, r, Math.PI + Math.PI * 0.15, Math.PI * 2 - Math.PI * 0.15);
        ctx.stroke();
      }

      function drawBall() {
        /* Ball at the launch point — visible during AIMING. Hidden
           during SHOOTING (the in-flight ball is drawn instead) so we
           don't show two balls at once. */
        if (gameState === STATE.SHOOTING || gameState === STATE.RESOLVING) return;
        drawBallAt(SCENE.launchX, SCENE.launchY, SCENE.ballR);
      }

      function drawBallInFlight() {
        if (!shot || gameState !== STATE.SHOOTING) return;
        const t = Math.min(1, (performance.now() - shot.startedAt) / currentFlightMs);
        const x = shot.fromX + (shot.toX - shot.fromX) * t;
        const flatY = shot.fromY + (shot.toY - shot.fromY) * t;
        /* Parabolic apex — peaks above the linear interpolation at
           t=0.5. Negative apex pulls the curve up on canvas. */
        const apex = -110;
        const arc = -4 * apex * t * (1 - t);
        const y = flatY + arc;
        const r = SCENE.ballR * (1 - 0.45 * t);
        drawBallAt(x, y, r);
      }

      function drawOutcomeFlash() {
        if (flashType === null) return;
        const elapsed = performance.now() - flashAt;
        if (elapsed >= FLASH_MS) {
          flashType = null;
          return;
        }
        const fade = 1 - elapsed / FLASH_MS;

        if (flashType === 'make') {
          /* Green pulse over the net area */
          ctx.fillStyle = `rgba(95, 191, 110, ${0.32 * fade})`;
          ctx.beginPath();
          ctx.ellipse(
            SCENE.hoopX,
            SCENE.hoopY + 18,
            SCENE.rimRx * 1.05,
            SCENE.netDrop * 0.9,
            0,
            0,
            Math.PI * 2
          );
          ctx.fill();
        } else {
          /* Red rim halo */
          ctx.strokeStyle = `rgba(212, 75, 75, ${0.7 * fade})`;
          ctx.lineWidth = SCENE.rimThickness + 4;
          ctx.beginPath();
          ctx.ellipse(
            SCENE.hoopX,
            SCENE.hoopY,
            SCENE.rimRx + 4,
            SCENE.rimRy + 4,
            0,
            0,
            Math.PI * 2
          );
          ctx.stroke();
        }
      }

      function drawReticle() {
        const info = cursorRimInfo();
        const x = virtualCursor.x;
        const y = virtualCursor.y;
        const lit = info.onRim;
        const color = lit ? 'rgba(255, 255, 255, 1)' : 'rgba(232, 228, 217, 0.6)';

        ctx.save();
        ctx.strokeStyle = color;
        ctx.lineWidth = lit ? 2.4 : 1.8;

        /* Outer ring — large, BCI-friendly */
        ctx.beginPath();
        ctx.arc(x, y, 14, 0, Math.PI * 2);
        ctx.stroke();

        /* Crosshair arms */
        const arm = lit ? 9 : 7;
        const inner = 4;
        ctx.beginPath();
        ctx.moveTo(x - arm, y);
        ctx.lineTo(x - inner, y);
        ctx.moveTo(x + inner, y);
        ctx.lineTo(x + arm, y);
        ctx.moveTo(x, y - arm);
        ctx.lineTo(x, y - inner);
        ctx.moveTo(x, y + inner);
        ctx.lineTo(x, y + arm);
        ctx.stroke();

        /* Center dot */
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(x, y, 1.8, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }

      function drawScene() {
        ctx.clearRect(0, 0, W, H);
        drawWall();
        drawCrowd();
        drawSpotlight();
        drawFloor();
        drawBackboardAndNet();
        drawRimRotating();
        drawOutcomeFlash();
        drawBall();
        drawBallInFlight();
        drawReticle();
      }

      /* ── HUD + status ─────────────────────────────────────────── */

      const hudShot = document.getElementById('hud-shot');
      const hudScore = document.getElementById('hud-score');
      const hudStreak = document.getElementById('hud-streak');
      const statusMsg = document.getElementById('status-msg');

      function updateHud() {
        const display = Math.min(shotIndex + 1, ROUND_SHOTS);
        hudShot.textContent = `${display} / ${ROUND_SHOTS}`;
        hudScore.textContent = String(score);
        hudStreak.textContent = String(streak);
      }

      function setStatus(html) {
        statusMsg.innerHTML = html;
      }

      /* ── Round flow + results + mode select ──────────────────── */

      const resultsOverlay = document.getElementById('results-overlay');
      const modeOverlay = document.getElementById('mode-overlay');

      function aimingPromptHTML() {
        const modeName = MODES[activeMode].name;
        return `<span class="accent">${modeName}</span> &middot; aim at a zone &middot; click matching color`;
      }

      function startRound() {
        shotIndex = 0;
        score = 0;
        miss = 0;
        streak = 0;
        longestStreak = 0;
        shot = null;
        flashType = null;
        analyticsSession = BCI.createSession();
        aimingStartedAt = Date.now();
        gameState = STATE.AIMING;
        resultsOverlay.classList.remove('is-visible');
        modeOverlay.classList.remove('is-visible');
        updateHud();
        setStatus(aimingPromptHTML());
      }

      function showResults() {
        document.getElementById('results-made').textContent = `${score} / ${ROUND_SHOTS}`;
        const accPct = Math.round((score / ROUND_SHOTS) * 100);
        document.getElementById('results-acc').textContent = accPct + '%';
        document.getElementById('results-streak').textContent = String(longestStreak);
        resultsOverlay.classList.add('is-visible');
        setStatus(`<span class="accent">${MODES[activeMode].name}</span> &middot; round complete`);

        /* Persist this round into the per-mode analytics bucket. */
        if (analyticsSession) {
          BCI.saveSession(analyticsGameId(), analyticsSession, {
            mode: activeMode,
            score,
            miss,
            longestStreak,
            roundShots: ROUND_SHOTS,
          });
          analyticsSession = null;
        }
      }

      function showModeSelect() {
        gameState = STATE.MODE_SELECT;
        analyticsSession = null;
        shot = null;
        flashType = null;
        resultsOverlay.classList.remove('is-visible');
        modeOverlay.classList.add('is-visible');
        setStatus('<span class="accent">Select a mode</span>');
      }

      document.getElementById('btn-play-again').addEventListener('click', startRound);
      document.getElementById('btn-results-modes').addEventListener('click', showModeSelect);
      document
        .getElementById('btn-results-home')
        .addEventListener('click', () => BCI.goToLauncher());

      document.querySelectorAll('.mode-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          const modeId = btn.dataset.mode;
          if (!MODES[modeId]) return;
          applyMode(modeId);
          startRound();
        });
      });

      /* ── Settings ────────────────────────────────────────────── */

      const settingsModal = document.getElementById('settings-modal');
      const sensSlider = document.getElementById('settings-sens-slider');
      const sensVal = document.getElementById('settings-sens-val');

      function loadSettingsIntoUI() {
        const s = BCI.getEffectiveSettings(GAME_ID);
        sensSlider.value = Math.round(s.cursorSensitivity * 100);
        sensVal.textContent = s.cursorSensitivity.toFixed(2) + '×';
      }

      function openSettings() {
        loadSettingsIntoUI();
        settingsModal.classList.add('is-visible');
      }

      function closeSettings() {
        settingsModal.classList.remove('is-visible');
      }

      document.getElementById('btn-settings').addEventListener('click', openSettings);
      document.getElementById('settings-close').addEventListener('click', closeSettings);
      settingsModal.addEventListener('mousedown', (e) => {
        if (e.target === settingsModal) closeSettings();
      });

      sensSlider.addEventListener('input', (e) => {
        const sens = parseInt(e.target.value, 10) / 100;
        sensVal.textContent = sens.toFixed(2) + '×';
        BCI.saveGlobalSettings({ cursorSensitivity: sens });
        if (virtualCursor) virtualCursor.setSensitivity(sens);
      });

      document.getElementById('settings-reset').addEventListener('click', () => {
        BCI.saveGlobalSettings({
          cursorSensitivity: 1.0,
          enabledClicks: { 0: true, 1: true, 2: true },
        });
        loadSettingsIntoUI();
        if (virtualCursor) virtualCursor.setSensitivity(1.0);
      });

      document.getElementById('settings-replay').addEventListener('click', () => {
        closeSettings();
        startRound();
      });

      document.getElementById('settings-modes').addEventListener('click', () => {
        closeSettings();
        showModeSelect();
      });

      /* ── Input ────────────────────────────────────────────────── */

      canvas.addEventListener('mousedown', (e) => {
        e.preventDefault();
        if (gameState !== STATE.AIMING) return;

        const click = BCI.CLICK_BY_BUTTON[e.button];
        if (!click) return;

        const info = cursorRimInfo();
        if (!info.onRim) return; // off-rim clicks ignored — no shot, no miss

        const colorName = clickIdToColorName(click.id);
        if (!colorName) return;

        const reactionMs = Date.now() - aimingStartedAt;
        if (analyticsSession) {
          BCI.recordReaction(analyticsSession, click.id, reactionMs);
        }

        shot = {
          startedAt: performance.now(),
          fromX: SCENE.launchX,
          fromY: SCENE.launchY,
          toX: virtualCursor.x,
          toY: virtualCursor.y,
          targetAngle: info.angle,
          clickColor: colorName,
          clickId: click.id,
          outcome: null,
          resolvedAt: 0,
        };
        gameState = STATE.SHOOTING;
        setStatus('<span class="accent">Shot fired</span>');
      });

      /* ── Tick ────────────────────────────────────────────────── */

      function currentRimSpeed() {
        /* Ramp up over the round so shot 10 demands real prediction.
           shot 1 = 1.00× base, shot 10 = 1 + 9 * 0.13 = 2.17× base. */
        const ramp = 1 + shotIndex * RIM_SPEED_RAMP_PER_SHOT;
        return RIM_SPEED_BASE * ramp * MODES[activeMode].rimSpeedMul;
      }

      function tick(now) {
        const dt = Math.min(0.05, (now - lastFrameMs) / 1000);
        lastFrameMs = now;

        /* Rim spins during all play states; freezes on round-end and
           mode-select so the menus feel still. */
        if (
          gameState === STATE.AIMING ||
          gameState === STATE.SHOOTING ||
          gameState === STATE.RESOLVING
        ) {
          rimAngle = (rimAngle + currentRimSpeed() * dt) % (Math.PI * 2);
        }

        if (gameState === STATE.SHOOTING) {
          if (now - shot.startedAt >= currentFlightMs) {
            /* Resolve: which zone is under the locked target angle right
               now? The rim has kept rotating during flight, so the answer
               depends on flight-time prediction — that's the skill. */
            const zoneColor = zoneColorAt(shot.targetAngle);
            const make = zoneColor === shot.clickColor;
            shot.outcome = make ? 'make' : 'miss';
            shot.resolvedAt = now;
            flashAt = now;
            flashType = make ? 'make' : 'miss';

            if (analyticsSession) {
              BCI.recordAttempt(analyticsSession, shot.clickId, make);
            }

            if (make) {
              score++;
              streak++;
              if (streak > longestStreak) longestStreak = streak;
              setStatus('<span class="accent">Bucket</span> &middot; +1');
            } else {
              miss++;
              streak = 0;
              setStatus('<span class="accent">Off the iron</span>');
            }
            gameState = STATE.RESOLVING;
            updateHud();
          }
        } else if (gameState === STATE.RESOLVING) {
          if (now - shot.resolvedAt >= RESOLVE_MS) {
            shotIndex++;
            if (shotIndex >= ROUND_SHOTS) {
              gameState = STATE.ROUND_END;
              showResults();
            } else {
              shot = null;
              gameState = STATE.AIMING;
              aimingStartedAt = Date.now();
              setStatus(aimingPromptHTML());
              updateHud();
            }
          }
        }
      }

      function loop(now) {
        tick(now);
        drawScene();
        requestAnimationFrame(loop);
      }

      /* ── Boot ────────────────────────────────────────────────── */

      const fitter = BCI.createViewportFitter(document.getElementById('game-wrapper'), {
        maxScale: 1.3,
        padding: 0.94,
      });
      fitter.fit();

      /* Apply the default mode at boot so SCENE values are coherent for
         the very first frame, then sit on the mode-select overlay until
         the player picks. */
      applyMode('ft');
      showModeSelect();
      requestAnimationFrame(loop);
    </script>
  </body>
</html>
