<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BCI Hoops — BCI Arcade</title>
    <style>
      :root {
        --bg-page: #0d1117;
        --bg-card: #1a222d;
        --bg-card-hover: #222c3a;
        --bg-badge-dim: #1f2630;
        --border: #2d333b;
        --border-strong: #3a4150;

        --text-primary: #e8e4d9;
        --text-muted: #9aa4b1;
        --text-dim: #5d6670;

        --click-blue: #4488ff;
        --click-orange: #ff8833;
        --click-purple: #aa44ff;

        --good: #5fbf6e;
        --bad: #d44b4b;

        /* Gym palette — fully themed environment, no BCI palette here */
        --gym-floor: #8a5a2b;
        --gym-floor-dark: #5b3a1a;
        --gym-floor-line: #d8a86a;
        --gym-wall: #14191f;
        --gym-crowd: #2a2f38;
        --gym-spot: rgba(255, 220, 160, 0.18);

        --backboard: #f3eee2;
        --backboard-edge: #b8b0a0;
        --backboard-square: #2a2f38;
        --rim-shadow: #0a0d10;
        --net-color: #f3eee2;
        --ball-orange: #d97a2c;
        --ball-orange-dark: #8d4a17;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: var(--bg-page);
        min-height: 100vh;
        font-family: 'Courier New', monospace;
        color: var(--text-primary);
        user-select: none;
        overflow: hidden;
      }

      #fit-wrap {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #game-wrapper {
        width: 900px;
        height: 700px;
        position: relative;
        transform-origin: center center;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      /* ── Header ──────────────────────────────────────────────── */
      .game-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 18px;
        padding: 12px 16px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 8px;
        height: 64px;
        flex-shrink: 0;
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .back-btn {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text-muted);
        font-family: inherit;
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        padding: 8px 13px;
        cursor: pointer;
        transition:
          color 0.15s,
          border-color 0.15s,
          background 0.15s;
      }
      .back-btn:hover {
        color: var(--text-primary);
        border-color: var(--click-blue);
        background: var(--bg-card-hover);
      }

      .title-block .game-title {
        font-size: 18px;
        font-weight: bold;
        letter-spacing: 4px;
        text-transform: uppercase;
      }
      .title-block .game-subtitle {
        font-size: 9px;
        color: var(--text-muted);
        letter-spacing: 3px;
        text-transform: uppercase;
        margin-top: 3px;
      }

      .hud {
        display: flex;
        align-items: center;
        gap: 22px;
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text-muted);
      }
      .hud-stat {
        display: flex;
        flex-direction: column;
        gap: 2px;
        align-items: center;
        min-width: 56px;
      }
      .hud-label {
        font-size: 9px;
        color: var(--text-dim);
      }
      .hud-value {
        font-size: 16px;
        font-weight: bold;
        color: var(--text-primary);
        font-family: inherit;
      }

      .header-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .icon-btn {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 6px;
        color: var(--text-muted);
        font-family: inherit;
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        padding: 8px 13px;
        cursor: pointer;
        transition:
          color 0.15s,
          border-color 0.15s,
          background 0.15s;
      }
      .icon-btn:hover {
        color: var(--text-primary);
        border-color: var(--border-strong);
        background: var(--bg-card-hover);
      }

      /* ── Canvas + court frame ────────────────────────────────── */
      .court-frame {
        position: relative;
        flex: 1;
        background: var(--gym-wall);
        border: 1px solid var(--border-strong);
        border-radius: 8px;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      canvas {
        display: block;
        cursor: none;
      }

      /* ── Bottom bar ──────────────────────────────────────────── */
      .bottom-bar {
        height: 88px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 8px;
        gap: 18px;
      }
      .bb-content {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .status-msg {
        font-size: 12px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--text-muted);
      }
      .status-msg .accent {
        color: var(--text-primary);
      }
      .home-slot {
        display: flex;
        align-items: center;
      }

      /* ── Settings modal placeholder (wired in later checkpoint) */
      .settings-modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.55);
        align-items: center;
        justify-content: center;
        z-index: 20;
      }
    </style>
  </head>

  <body oncontextmenu="return false;">
    <div id="fit-wrap">
      <div id="game-wrapper">
        <header class="game-header">
          <div class="header-left">
            <button class="back-btn" id="btn-back">&larr; Arcade</button>
            <div class="title-block">
              <div class="game-title">BCI Hoops</div>
              <div class="game-subtitle">Free Throw &middot; Three-Point</div>
            </div>
          </div>

          <div class="hud">
            <div class="hud-stat">
              <span class="hud-label">Shot</span>
              <span class="hud-value" id="hud-shot">— / —</span>
            </div>
            <div class="hud-stat">
              <span class="hud-label">Score</span>
              <span class="hud-value" id="hud-score">0</span>
            </div>
            <div class="hud-stat">
              <span class="hud-label">Streak</span>
              <span class="hud-value" id="hud-streak">0</span>
            </div>
          </div>

          <div class="header-right">
            <button class="icon-btn" id="btn-settings">Settings</button>
          </div>
        </header>

        <div class="court-frame">
          <canvas id="canvas" width="800" height="540"></canvas>
        </div>

        <div class="bottom-bar">
          <div class="bb-content">
            <div class="status-msg" id="status-msg">
              <span class="accent">Hoops v1</span> &middot; gym scene online &middot; rim rotation
              comes online next
            </div>
          </div>
          <div class="home-slot" id="home-slot"></div>
        </div>
      </div>
    </div>

    <div class="settings-modal" id="settings-modal"></div>

    <script src="../../shared/bci-input.js"></script>
    <script src="../../shared/bci-settings.js"></script>
    <script src="../../shared/bci-analytics.js"></script>
    <script src="../../shared/bci-shell.js"></script>
    <script>
      'use strict';

      const GAME_ID = 'hoops';

      const canvas = document.getElementById('canvas');
      const ctx = canvas.getContext('2d');
      const W = canvas.width;
      const H = canvas.height;

      /* Header buttons */
      document.getElementById('btn-back').addEventListener('click', () => {
        BCI.goToLauncher();
      });

      /* Home button slot — uses the shared component */
      document.getElementById('home-slot').appendChild(BCI.createHomeButton({ showLabel: true }));

      /* ── Scene geometry ────────────────────────────────────────
         All positions in canvas-local coords. Free-throw camera by
         default; checkpoint 9 will pull the camera back for 3PT by
         scaling SCENE.scale and adjusting the launch point. */
      const SCENE = {
        /* Hoop placement — rim center is the geometric anchor for
           rim drawing, rotation, and (later) hit detection. */
        hoopX: 400,
        hoopY: 218,

        /* Mildly flattened rim ellipse — keeps the gym 3D read but
           still legible as a "clock face" once the colored arcs ride
           around the ring in checkpoint 4. */
        rimRx: 70,
        rimRy: 18,
        rimThickness: 6,

        /* Backboard rectangle (centered above the rim). */
        boardW: 220,
        boardH: 130,
        boardYTop: 78,

        /* Net hangs straight down from the rim. */
        netDrop: 56,

        /* Floor / wall split — wall above, hardwood below. */
        floorY: 330,

        /* Free-throw launch point for the ball. */
        launchX: 400,
        launchY: 488,
        ballR: 18,
      };

      /* Virtual cursor — checkpoint 3 will draw a proper reticle on top of it */
      const settings = BCI.getEffectiveSettings(GAME_ID);
      const virtualCursor = BCI.createVirtualCursor(canvas, {
        sensitivity: settings.cursorSensitivity,
        startX: W / 2,
        startY: SCENE.hoopY,
      });

      /* ── Scene rendering ───────────────────────────────────────
         Pure draw functions, no game state. Checkpoint 4 will add a
         rotating-rim variant; everything else here stays static. */

      function drawWall() {
        const grad = ctx.createLinearGradient(0, 0, 0, SCENE.floorY);
        grad.addColorStop(0, '#0a0d12');
        grad.addColorStop(1, '#161b22');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, SCENE.floorY);
      }

      function drawCrowd() {
        /* Two rows of dim head-and-shoulders silhouettes against the
           back wall. Seeded values so the crowd doesn't shimmer. */
        const rows = [
          { y: SCENE.floorY - 28, count: 22, scale: 1.0, alpha: 0.55 },
          { y: SCENE.floorY - 56, count: 18, scale: 0.9, alpha: 0.35 },
        ];
        ctx.fillStyle = '#000';
        for (const row of rows) {
          ctx.globalAlpha = row.alpha;
          for (let i = 0; i < row.count; i++) {
            const t = (i + 0.5) / row.count;
            /* Stable pseudo-random jitter so each head sits a little
               differently. */
            const jitter = Math.sin(i * 12.9898 + row.y) * 0.5;
            const x = t * W + jitter * 8;
            const headR = 7 * row.scale;
            const shoulderW = 22 * row.scale;
            const shoulderH = 14 * row.scale;
            /* Head */
            ctx.beginPath();
            ctx.arc(x, row.y - shoulderH * 0.4, headR, 0, Math.PI * 2);
            ctx.fill();
            /* Shoulders */
            ctx.beginPath();
            ctx.ellipse(x, row.y, shoulderW / 2, shoulderH / 2, 0, 0, Math.PI * 2);
            ctx.fill();
          }
        }
        ctx.globalAlpha = 1;
      }

      function drawSpotlight() {
        /* Warm radial light centered on the rim, fades out. Drawn
           after the wall/crowd so it lifts the hoop area. */
        const grad = ctx.createRadialGradient(
          SCENE.hoopX,
          SCENE.hoopY - 10,
          20,
          SCENE.hoopX,
          SCENE.hoopY - 10,
          340
        );
        grad.addColorStop(0, 'rgba(255, 220, 160, 0.22)');
        grad.addColorStop(0.55, 'rgba(255, 200, 130, 0.07)');
        grad.addColorStop(1, 'rgba(255, 200, 130, 0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, SCENE.floorY + 40);
      }

      function drawFloor() {
        /* Hardwood band with simple perspective: a darker far edge at
           SCENE.floorY, lighter as it comes forward. Plank lines fan
           out from a vanishing point above the rim. */
        const floorTop = SCENE.floorY;
        const grad = ctx.createLinearGradient(0, floorTop, 0, H);
        grad.addColorStop(0, '#5b3a1a');
        grad.addColorStop(0.4, '#7a4f24');
        grad.addColorStop(1, '#8a5a2b');
        ctx.fillStyle = grad;
        ctx.fillRect(0, floorTop, W, H - floorTop);

        /* Plank lines — fan from vanishing point at (hoopX, hoopY-30). */
        const vpX = SCENE.hoopX;
        const vpY = SCENE.hoopY - 30;
        ctx.strokeStyle = 'rgba(40, 22, 8, 0.45)';
        ctx.lineWidth = 1;
        const planks = 11;
        for (let i = 0; i <= planks; i++) {
          const t = i / planks;
          const xBottom = -W * 0.1 + t * (W * 1.2);
          ctx.beginPath();
          ctx.moveTo(vpX + (xBottom - vpX) * 0.18, floorTop);
          ctx.lineTo(xBottom, H);
          ctx.stroke();
        }

        /* Free-throw line — subtle painted arc on the floor, just
           behind the launch point so it reads as "this is where the
           shot starts." */
        ctx.strokeStyle = 'rgba(216, 168, 106, 0.55)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.ellipse(SCENE.launchX, SCENE.launchY + 6, 92, 14, 0, Math.PI, Math.PI * 2);
        ctx.stroke();
      }

      function drawBackboardAndNet() {
        const cx = SCENE.hoopX;
        const top = SCENE.boardYTop;
        const w = SCENE.boardW;
        const h = SCENE.boardH;

        /* Backboard plate */
        ctx.fillStyle = '#f3eee2';
        ctx.fillRect(cx - w / 2, top, w, h);

        /* Backboard edge shadow */
        ctx.strokeStyle = '#b8b0a0';
        ctx.lineWidth = 2;
        ctx.strokeRect(cx - w / 2, top, w, h);

        /* Inner shot square (the painted target on the glass) */
        const sqW = 78;
        const sqH = 56;
        ctx.strokeStyle = '#2a2f38';
        ctx.lineWidth = 3;
        ctx.strokeRect(cx - sqW / 2, top + h - sqH - 14, sqW, sqH);

        /* Pole/mount stub behind the backboard, just for depth */
        ctx.fillStyle = '#1a1f26';
        ctx.fillRect(cx - 6, top - 8, 12, 8);

        /* Net — inverted V-mesh hanging from the rim front edge */
        const rimY = SCENE.hoopY;
        const rimRx = SCENE.rimRx;
        const netBottomW = rimRx * 1.05;
        const netBottomY = rimY + SCENE.netDrop;

        ctx.strokeStyle = 'rgba(243, 238, 226, 0.85)';
        ctx.lineWidth = 1.4;

        const cords = 9;
        for (let i = 0; i <= cords; i++) {
          const t = i / cords;
          const xTop = cx - rimRx + t * rimRx * 2;
          const xBottom = cx - netBottomW + t * netBottomW * 2 * 0.85;
          ctx.beginPath();
          ctx.moveTo(xTop, rimY);
          ctx.lineTo(xBottom, netBottomY);
          ctx.stroke();
        }
        /* Two horizontal bands across the net for the mesh feel */
        for (let band = 1; band <= 2; band++) {
          const t = band / 3;
          const y = rimY + t * SCENE.netDrop;
          const halfW = rimRx + (netBottomW - rimRx) * t * 0.85;
          ctx.beginPath();
          ctx.moveTo(cx - halfW, y);
          ctx.lineTo(cx + halfW, y);
          ctx.stroke();
        }
      }

      function drawRimNeutral() {
        /* Static neutral rim for checkpoint 2. Checkpoint 4 replaces
           this with the rotating clock-face version. */
        const cx = SCENE.hoopX;
        const cy = SCENE.hoopY;
        const rx = SCENE.rimRx;
        const ry = SCENE.rimRy;

        /* Soft drop shadow on the floor below the rim */
        ctx.fillStyle = 'rgba(10, 13, 16, 0.4)';
        ctx.beginPath();
        ctx.ellipse(cx, cy + 4, rx + 2, ry + 2, 0, 0, Math.PI * 2);
        ctx.fill();

        /* Rim ring — drawn as a thick ellipse stroke. */
        ctx.strokeStyle = '#d97a2c';
        ctx.lineWidth = SCENE.rimThickness;
        ctx.beginPath();
        ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
        ctx.stroke();

        /* Highlight pass — top half a touch brighter for dimension */
        ctx.strokeStyle = 'rgba(255, 200, 130, 0.6)';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.ellipse(cx, cy, rx, ry, 0, Math.PI, Math.PI * 2);
        ctx.stroke();
      }

      function drawBall() {
        const x = SCENE.launchX;
        const y = SCENE.launchY;
        const r = SCENE.ballR;

        /* Ground shadow */
        ctx.fillStyle = 'rgba(10, 13, 16, 0.45)';
        ctx.beginPath();
        ctx.ellipse(x, y + r * 0.85, r * 0.85, r * 0.25, 0, 0, Math.PI * 2);
        ctx.fill();

        /* Ball body — radial gradient for soft volume */
        const grad = ctx.createRadialGradient(x - r * 0.35, y - r * 0.35, r * 0.2, x, y, r);
        grad.addColorStop(0, '#f0a55a');
        grad.addColorStop(0.6, '#d97a2c');
        grad.addColorStop(1, '#8d4a17');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();

        /* Seam lines */
        ctx.strokeStyle = 'rgba(40, 22, 8, 0.85)';
        ctx.lineWidth = 1.4;
        ctx.beginPath();
        ctx.moveTo(x - r, y);
        ctx.lineTo(x + r, y);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(x, y, r, Math.PI * 0.15, Math.PI - Math.PI * 0.15);
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(x, y, r, Math.PI + Math.PI * 0.15, Math.PI * 2 - Math.PI * 0.15);
        ctx.stroke();
      }

      function drawScene() {
        ctx.clearRect(0, 0, W, H);
        drawWall();
        drawCrowd();
        drawSpotlight();
        drawFloor();
        drawBackboardAndNet();
        drawRimNeutral();
        drawBall();

        /* Cursor preview — checkpoint 3 replaces with proper reticle */
        BCI.drawCursorDot(ctx, virtualCursor.x, virtualCursor.y, {
          color: 'rgba(232, 228, 217, 0.9)',
        });
      }

      function loop() {
        drawScene();
        requestAnimationFrame(loop);
      }

      const fitter = BCI.createViewportFitter(document.getElementById('game-wrapper'), {
        maxScale: 1.3,
        padding: 0.94,
      });
      fitter.fit();

      loop();
    </script>
  </body>
</html>
