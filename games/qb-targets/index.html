<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QB Targets — BCI Arcade</title>
    <style>
      :root {
        --bg-page: #0d1117;
        --text-primary: #e8e4d9;
        --text-muted: #9aa4b1;
        --text-dim: #5d6670;
        --click-orange: #ff8833;
        --dev-text: #d4a35a;
        --dev-bg: #2a221a;
        --dev-border: #4a3d2d;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: var(--bg-page);
        min-height: 100vh;
        font-family: 'Courier New', monospace;
        color: var(--text-primary);
        display: flex;
        align-items: center;
        justify-content: center;
        user-select: none;
      }

      .stub {
        text-align: center;
        max-width: 480px;
        padding: 40px 28px;
      }

      .stub-badge {
        display: inline-block;
        font-size: 10px;
        letter-spacing: 2px;
        text-transform: uppercase;
        padding: 5px 12px;
        border-radius: 3px;
        font-weight: bold;
        background: var(--dev-bg);
        color: var(--dev-text);
        border: 1px solid var(--dev-border);
        margin-bottom: 22px;
      }

      .stub-title {
        font-size: 28px;
        font-weight: bold;
        letter-spacing: 3px;
        text-transform: uppercase;
        margin-bottom: 14px;
      }

      .stub-desc {
        font-size: 13px;
        color: var(--text-muted);
        line-height: 1.7;
        margin-bottom: 28px;
      }

      .stub-spec {
        font-size: 11px;
        color: var(--text-dim);
        letter-spacing: 1px;
        line-height: 1.8;
      }
    </style>
  </head>
  <body>
    <div class="stub">
      <div class="stub-badge">In Progress</div>
      <div class="stub-title">QB Targets</div>
      <div class="stub-desc">
        v1 spec is locked. Build checkpoints are kicking off — static field scene comes first, then
        receivers, windows, click rules, ball flight, polish.
      </div>
      <div class="stub-spec">
        Behind-QB camera · Discrete plays · 4 receivers · 2–3 windows<br />
        15-throw drill · Sack vs incompletion · Forgiveness sliders
      </div>
    </div>

    <!-- Shared BCI modules -->
    <script src="../../shared/bci-input.js"></script>
    <script src="../../shared/bci-settings.js"></script>
    <script src="../../shared/bci-shell.js"></script>
  </body>
</html>
